<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@ruknnalshawarma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Tajawal:wght@700;900&family=IBM+Plex+Sans:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'IBM Plex Sans',sans-serif;background:#79664e}

.bg{
  position:fixed;inset:0;z-index:0;
  background:url('https://raw.githubusercontent.com/ruknalshawarma/menu/main/main%20page.jpeg') center/cover no-repeat;
  filter:blur(2px) brightness(0.65);
  transform:scale(1.05)
}




.lang-toggle{
  position:fixed;top:16px;right:16px;z-index:10;
  display:flex;align-items:center;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:30px;overflow:hidden;
  font-family:'IBM Plex Sans',sans-serif;
}
.lang-toggle button{
  padding:6px 16px;background:transparent;border:none;
  color:rgba(255,255,255,0.65);font-size:0.78rem;font-weight:700;
  letter-spacing:1px;cursor:pointer;transition:all .2s;
}
.lang-toggle button.active{background:rgba(255,255,255,0.28);color:#fff;border-radius:30px}

.wrap{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 18px;
  width:100%;
  max-width:520px;
}

.avatar{
  width:94px;height:94px;border-radius:50%;object-fit:cover;
  border:2.5px solid rgba(255,255,255,0.45);
  box-shadow:0 0 0 4px rgba(255,255,255,0.1)
}

.name{
  margin-top:12px;font-size:1.45rem;font-weight:900;color:#fff;
  text-align:center;letter-spacing:1px;
}
[lang="ar"] .name{font-family:'Tajawal',sans-serif}
[lang="en"] .name{font-family:'Playfair Display',serif}

.bio{
  margin-top:6px;font-size:0.88rem;font-weight:700;
  color:rgba(255,255,255,0.88);text-align:center;line-height:1.6;max-width:300px;
}
[lang="ar"] .bio{font-family:'Tajawal',sans-serif;direction:rtl}
[lang="en"] .bio{font-family:'IBM Plex Sans',sans-serif;direction:ltr}

.i-ar,.i-en{display:none}
[lang="ar"] .i-ar{display:inline}
[lang="en"] .i-en{display:inline}
[lang="ar"] .b-ar{display:block}
[lang="en"] .b-en{display:block}
.b-ar,.b-en{display:none}

.socials{display:flex;gap:2px;margin-top:10px;justify-content:center;align-items:center}
.socials a{padding:5px;color:#fff;display:inline-flex;transition:transform .15s}
.socials a:hover{transform:scale(1.12)}
.socials svg{width:26px;height:26px;fill:currentColor}

.share-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;margin-left:6px;
  background:rgba(255,255,255,0.18);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.3);border-radius:20px;
  color:#fff;font-size:0.72rem;font-weight:700;letter-spacing:0.8px;
  cursor:pointer;text-decoration:none;transition:background .2s,transform .15s;
}
.share-btn:hover{background:rgba(255,255,255,0.3);transform:scale(1.05)}
.share-btn svg{width:14px;height:14px;fill:#fff}

.btns{width:60%;display:flex;flex-direction:column;gap:12px;margin-top:18px}

.menu-btn{
  width:100%;min-height:68px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.12);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.25);border-radius:3px;
  text-decoration:none;cursor:pointer;transition:background .2s,transform .15s;
  font-size:1.05rem;font-weight:900;color:#fff;letter-spacing:3px;text-transform:uppercase;
  gap:10px;
}
.menu-btn:hover{background:rgba(255,255,255,0.22);transform:translateY(-1px)}
[lang="ar"] .menu-btn{font-family:'Tajawal',sans-serif;letter-spacing:0.5px}
[lang="en"] .menu-btn{font-family:'Playfair Display',serif}
.menu-btn svg{width:20px;height:20px;fill:#fff}

.loc-btn{
  width:100%;min-height:68px;
  display:flex;align-items:stretch;
  background:rgba(255,255,255,0.12);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.25);border-radius:3px;
  text-decoration:none;overflow:hidden;cursor:pointer;
  transition:background .2s,transform .15s;
}
.loc-btn:hover{background:rgba(255,255,255,0.22);transform:translateY(-1px)}

.loc-map-wrap{width:82px;position:relative;flex-shrink:0;overflow:hidden}
.loc-map{width:100%;height:100%;object-fit:cover;display:block;opacity:0.88}
.pulse{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;background:#4ade80;z-index:2;
}
.pulse::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid #4ade80;animation:ring 1.8s ease-out infinite
}
@keyframes ring{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(2.4)}}

.loc-sep{width:1px;background:rgba(255,255,255,0.2);flex-shrink:0}
.loc-info{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0 10px}
.loc-name{font-size:0.95rem;font-weight:900;color:#fff}
.loc-area{font-size:0.73rem;font-weight:700;color:rgba(255,255,255,0.72)}
[lang="ar"] .loc-name,[lang="ar"] .loc-area{font-family:'Tajawal',sans-serif}
[lang="en"] .loc-name,[lang="en"] .loc-area{font-family:'IBM Plex Sans',sans-serif}
.loc-icon{width:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pin{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center
}
.pin svg{width:16px;height:16px;fill:#fff}

@media(max-height:640px){
  .avatar{width:70px;height:70px}
  .name{font-size:1.1rem;margin-top:8px}
  .bio{font-size:0.8rem}
  .btns{gap:8px;margin-top:12px}
  .menu-btn,.loc-btn{min-height:56px}
  .loc-map-wrap{width:66px}
}
</style>
</head>
<body>

<script>
function setLang(l){
  var r=document.getElementById('root');
  r.setAttribute('lang',l);r.setAttribute('dir',l==='ar'?'rtl':'ltr');
  document.documentElement.setAttribute('lang',l);
  document.documentElement.setAttribute('dir',l==='ar'?'rtl':'ltr');
  document.getElementById('btn-ar').classList.toggle('active',l==='ar');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  localStorage.setItem('slmlek_lang',l);
}
(function(){var s=localStorage.getItem('slmlek_lang');if(s&&s!=='ar')setLang(s)})();
function shareLink(e){
  e.preventDefault();
  if(navigator.share)navigator.share({title:'@slmlek_sa',url:window.location.href});
  else if(navigator.clipboard){navigator.clipboard.writeText(window.location.href);alert('Link copied!');}
}
</script>
