<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@ruknnalshawarma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Tajawal:wght@700;900&family=IBM+Plex+Sans:wght@700&display=swap" rel="stylesheet">
<style>

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Root ── */
html {
  height: 100%;
  font-size: 16px;
}
body {
  min-height: 100%;
  font-family: 'IBM Plex Sans', sans-serif;
  background: #79664e;
  overflow-x: hidden;
  overflow-y: auto;
}

/* ── Background ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: url('https://raw.githubusercontent.com/ruknalshawarma/menu/main/main%20page.jpeg') center / cover no-repeat;
  filter: blur(2px) brightness(0.65);
  transform: scale(1.05);
  pointer-events: none;
}

/* ── Language toggle ── */
.lang-toggle {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 100;
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 30px;
  overflow: hidden;
  font-family: 'IBM Plex Sans', sans-serif;
}
.lang-toggle button {
  padding: 6px 14px;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.65);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .2s;
}
.lang-toggle button.active {
  background: rgba(255,255,255,0.28);
  color: #fff;
  border-radius: 30px;
}

/* ── Page wrapper ── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 70px 16px 32px; /* top pad clears lang toggle */
}

/* ── Card ── */
.wrap {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Avatar ── */
.avatar {
  width: clamp(72px, 18vw, 100px);
  height: clamp(72px, 18vw, 100px);
  border-radius: 50%;
  object-fit: cover;
  border: 2.5px solid rgba(255,255,255,0.45);
  box-shadow: 0 0 0 4px rgba(255,255,255,0.1);
  flex-shrink: 0;
}

/* ── Name ── */
.name {
  margin-top: 12px;
  font-size: clamp(1.1rem, 4vw, 1.45rem);
  font-weight: 900;
  color: #fff;
  text-align: center;
  letter-spacing: 1px;
}
[lang="ar"] .name { font-family: 'Tajawal', sans-serif; }
[lang="en"] .name { font-family: 'Playfair Display', serif; }

/* ── Bio ── */
.bio {
  margin-top: 6px;
  font-size: clamp(0.78rem, 3vw, 0.88rem);
  font-weight: 700;
  color: rgba(255,255,255,0.88);
  text-align: center;
  line-height: 1.6;
  max-width: 300px;
}
[lang="ar"] .bio { font-family: 'Tajawal', sans-serif; direction: rtl; }
[lang="en"] .bio { font-family: 'IBM Plex Sans', sans-serif; direction: ltr; }

/* ── i18n helpers ── */
.i-ar, .i-en { display: none; }
[lang="ar"] .i-ar { display: inline; }
[lang="en"] .i-en { display: inline; }
[lang="ar"] .b-ar { display: block; }
[lang="en"] .b-en { display: block; }
.b-ar, .b-en { display: none; }

/* ── Socials row ── */
.socials {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 16px;
  justify-content: center;
  align-items: center;
  width: 100%;
}

/* ── Social icon bubbles ── */
.socials a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: clamp(42px, 11vw, 52px);
  height: clamp(42px, 11vw, 52px);
  border-radius: 50%;
  text-decoration: none;
  flex-shrink: 0;
  transition: transform .18s, box-shadow .18s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.35);
}
.socials a:hover, .socials a:focus {
  transform: scale(1.13);
  box-shadow: 0 6px 20px rgba(0,0,0,0.45);
}
.socials svg {
  width: clamp(20px, 5.5vw, 26px);
  height: clamp(20px, 5.5vw, 26px);
  fill: #fff;
  display: block;
}

/* Brand colours */
.soc-instagram {
  background: radial-gradient(circle at 30% 110%, #ffdb8b 0%, #ee653d 25%, #d42e81 50%, #a237c4 75%, #4968b2 100%);
}
.soc-facebook  { background: #1877F2; }
.soc-tiktok    { background: #010101; border: 1.5px solid rgba(255,255,255,0.18); }
.soc-whatsapp  { background: #25D366; }

/* ── Copy Link pill ── */
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px;
  height: clamp(42px, 11vw, 52px);
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 26px;
  color: #fff;
  font-size: clamp(0.68rem, 2.2vw, 0.75rem);
  font-weight: 700;
  letter-spacing: 0.8px;
  cursor: pointer;
  text-decoration: none;
  outline: none;
  -webkit-appearance: none;
  transition: background .2s, transform .18s, box-shadow .18s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  flex-shrink: 0;
}
.share-btn:hover, .share-btn:focus {
  background: rgba(255,255,255,0.3);
  transform: scale(1.07);
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}
.share-btn svg {
  width: clamp(13px, 4vw, 16px);
  height: clamp(13px, 4vw, 16px);
  fill: #fff;
  flex-shrink: 0;
}

/* ── Action buttons ── */
.btns {
  width: min(100%, 340px);
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

.menu-btn {
  width: 100%;
  min-height: clamp(56px, 14vw, 68px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 3px;
  text-decoration: none;
  cursor: pointer;
  transition: background .2s, transform .15s;
  font-size: clamp(0.88rem, 3vw, 1.05rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: 3px;
  text-transform: uppercase;
  gap: 10px;
}
.menu-btn:hover { background: rgba(255,255,255,0.22); transform: translateY(-2px); }
[lang="ar"] .menu-btn { font-family: 'Tajawal', sans-serif; letter-spacing: 0.5px; }
[lang="en"] .menu-btn { font-family: 'Playfair Display', serif; }
.menu-btn svg { width: 20px; height: 20px; fill: #fff; }

.loc-btn {
  width: 100%;
  min-height: clamp(56px, 14vw, 68px);
  display: flex;
  align-items: stretch;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 3px;
  text-decoration: none;
  overflow: hidden;
  cursor: pointer;
  transition: background .2s, transform .15s;
}
.loc-btn:hover { background: rgba(255,255,255,0.22); transform: translateY(-2px); }

.loc-map-wrap {
  width: clamp(60px, 16vw, 82px);
  position: relative;
  flex-shrink: 0;
  overflow: hidden;
}
.loc-map { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.88; }

.pulse {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #4ade80;
  z-index: 2;
}
.pulse::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid #4ade80;
  animation: ring 1.8s ease-out infinite;
}
@keyframes ring {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(2.4); }
}

.loc-sep  { width: 1px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
.loc-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 0 10px;
}
.loc-name { font-size: clamp(0.8rem, 3vw, 0.95rem); font-weight: 900; color: #fff; text-align: center; }
.loc-area { font-size: clamp(0.65rem, 2.2vw, 0.73rem); font-weight: 700; color: rgba(255,255,255,0.72); text-align: center; }
[lang="ar"] .loc-name, [lang="ar"] .loc-area { font-family: 'Tajawal', sans-serif; }
[lang="en"] .loc-name, [lang="en"] .loc-area { font-family: 'IBM Plex Sans', sans-serif; }

.loc-icon { width: 46px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.pin {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
}
.pin svg { width: 16px; height: 16px; fill: #fff; }

/* ── Tablet / small desktop (≥ 600px) ── */
@media (min-width: 600px) {
  .page { padding-top: 80px; }
  .btns { width: min(100%, 380px); }
  .socials { gap: 12px; }
}

/* ── Large desktop (≥ 1024px) ── */
@media (min-width: 1024px) {
  .wrap { max-width: 520px; }
  .btns { width: 360px; gap: 14px; margin-top: 22px; }
}

/* ── Short screens (landscape phones) ── */
@media (max-height: 600px) {
  .page { align-items: flex-start; padding-top: 60px; padding-bottom: 24px; }
  .avatar { width: 64px; height: 64px; }
  .name { font-size: 1rem; margin-top: 8px; }
  .bio { font-size: 0.76rem; }
  .socials { margin-top: 10px; gap: 8px; }
  .btns { gap: 8px; margin-top: 12px; }
  .menu-btn, .loc-btn { min-height: 50px; }
}

/* ── Very small phones (≤ 360px wide) ── */
@media (max-width: 360px) {
  .share-btn { padding: 0 11px; font-size: 0.65rem; }
  .btns { width: 100%; }
}

</style>
</head>

<script>
function setLang(l) {
  var r = document.getElementById('root');
  r.setAttribute('lang', l);
  r.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
  document.documentElement.setAttribute('lang', l);
  document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
  document.getElementById('btn-ar').classList.toggle('active', l === 'ar');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  localStorage.setItem('rukn_lang', l);
}
(function () {
  var s = localStorage.getItem('rukn_lang');
  if (s && s !== 'ar') setLang(s);
})();

function copyLink(btn) {
  var url = 'https://ruknalshawarma.github.io/main/';
  var arLbl = btn.querySelector('.i-ar.lbl');
  var enLbl = btn.querySelector('.i-en.lbl');

  function showCopied() {
    btn.querySelector('.icon-copy').style.display = 'none';
    btn.querySelector('.icon-check').style.display = 'block';
    if (arLbl) arLbl.textContent = 'تم النسخ!';
    if (enLbl) enLbl.textContent = 'Copied!';
    btn.style.background = 'rgba(74,222,128,0.35)';
    btn.style.borderColor = 'rgba(74,222,128,0.6)';
    setTimeout(function () {
      btn.querySelector('.icon-copy').style.display = 'block';
      btn.querySelector('.icon-check').style.display = 'none';
      if (arLbl) arLbl.textContent = 'نسخ الرابط';
      if (enLbl) enLbl.textContent = 'Copy Link';
      btn.style.background = '';
      btn.style.borderColor = '';
    }, 2000);
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(showCopied).catch(function () {
      fallbackCopy(url); showCopied();
    });
  } else {
    fallbackCopy(url); showCopied();
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}
</script>
